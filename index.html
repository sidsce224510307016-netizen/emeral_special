
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EMERALD – Table QR Codes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --yellow: #ffcc00;
  --yellow-dark: #cc9900;
  --bg: #0f172a;
  --card: #1e293b;
  --border: rgba(255,204,0,0.2);
  --muted: #94a3b8;
  --text: #f1f5f9;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 30px 20px 60px;
}

/* ── HEADER ── */
.header { text-align:center; margin-bottom: 50px; }
.brand {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  color: var(--yellow);
  letter-spacing: 4px;
  text-shadow: 0 4px 20px rgba(255,204,0,0.3);
  margin-bottom: 8px;
}
.header-sub { color: var(--muted); font-size: 16px; font-weight: 500; }

/* ── BASE URL SETTER ── */
.url-bar {
  max-width: 700px;
  margin: 0 auto 50px;
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid var(--border);
}
.url-bar label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 10px;
}
.url-input-row { display: flex; gap: 10px; }
.url-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.url-input:focus { border-color: var(--yellow); }
.url-input::placeholder { color: var(--muted); }
.gen-btn {
  padding: 12px 24px;
  background: var(--yellow);
  color: #111;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.gen-btn:hover { background: var(--yellow-dark); color: #fff; }
.url-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* ── PRINT ALL BUTTON ── */
.top-actions {
  max-width: 1200px;
  margin: 0 auto 30px;
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}
.print-all-btn {
  padding: 12px 28px;
  background: transparent;
  border: 1.5px solid var(--yellow);
  color: var(--yellow);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.print-all-btn:hover { background: rgba(255,204,0,0.1); }
.print-all-btn svg { width:16px; height:16px; }

/* ── TABLE GRID ── */
.tables-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.table-qr-card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.table-qr-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  border-color: rgba(255,204,0,0.5);
}

.card-top {
  background: linear-gradient(135deg, #1a2744 0%, #1e293b 100%);
  padding: 18px 18px 12px;
  text-align: center;
}
.table-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 4px;
}
.table-num {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  color: var(--yellow);
  line-height: 1;
}

.qr-wrap {
  padding: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #fff;
}
.qr-wrap canvas, .qr-wrap img { display: block; }

.card-bottom {
  padding: 14px 18px;
  display: flex;
  gap: 8px;
}
.card-btn {
  flex: 1;
  padding: 9px 0;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.card-btn svg { width:13px; height:13px; flex-shrink:0; }
.btn-print {
  background: rgba(255,204,0,0.12);
  color: var(--yellow);
  border: 1px solid rgba(255,204,0,0.3);
}
.btn-print:hover { background: rgba(255,204,0,0.2); }
.btn-open {
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  border: 1px solid rgba(255,255,255,0.08);
}
.btn-open:hover { color: var(--text); background: rgba(255,255,255,0.1); }

/* ── PRINT STYLES ── */
@media print {
  body > *                { display: none !important; }
  #print-sheet            { display: block !important; }
}

#print-sheet {
  display: none;
}

@media print {
  #print-sheet {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    padding: 0;
    background: white;
  }
  .print-cell {
    border: 1px solid #ddd;
    padding: 20px 16px;
    text-align: center;
    page-break-inside: avoid;
  }
  .print-cell-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 4px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
  }
  .print-cell-table {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 12px;
  }
  .print-cell-num {
    font-size: 36px;
    font-weight: 900;
    color: #111;
    margin-bottom: 12px;
  }
  .print-cell-qr { margin: 0 auto 10px; }
  .print-cell-url {
    font-size: 9px;
    color: #999;
    word-break: break-all;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">EMERALD</div>
  <div class="header-sub">Table QR Code Generator · 23 Tables</div>
</div>

<!-- URL Input -->
<div class="url-bar">
  <label>Your Menu URL (where menu.html is hosted)</label>
  <div class="url-input-row">
    <input type="text" class="url-input" id="baseUrl"
      placeholder="e.g. https://yourdomain.com/menu.html"
      value="">
    <button class="gen-btn" onclick="generateAll()">Generate QRs</button>
  </div>
  <div class="url-hint">
    💡 Each QR will link to <code>menu.html?table=1</code>, <code>menu.html?table=2</code>, etc.
    If running locally, use <code>file:///path/to/menu.html</code> or your server URL.
  </div>
</div>

<div class="top-actions">
  <button class="print-all-btn" onclick="printAll()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
    </svg>
    Print All QR Codes
  </button>
</div>

<div class="tables-grid" id="tablesGrid"></div>

<!-- Hidden print sheet populated before window.print() -->
<div id="print-sheet"></div>

<script>
const TOTAL_TABLES = 23;
let currentBaseUrl = '';

/* ── Auto-detect URL on load ── */
window.addEventListener('DOMContentLoaded', () => {
  const auto = window.location.href.replace('index.html', 'menu.html').split('?')[0];
  document.getElementById('baseUrl').value = auto.endsWith('menu.html') ? auto : auto.replace(/\/?$/, '/menu.html');
  generateAll();
});

/* ── Generate all QR cards ── */
function generateAll() {
  currentBaseUrl = document.getElementById('baseUrl').value.trim();
  if (!currentBaseUrl) { alert('Please enter the menu URL first.'); return; }
  if (!currentBaseUrl.includes('menu.html')) {
    alert('URL should point to menu.html');
    return;
  }

  const grid = document.getElementById('tablesGrid');
  grid.innerHTML = '';

  for (let t = 1; t <= TOTAL_TABLES; t++) {
    const url = currentBaseUrl + '?table=' + t;

    const card = document.createElement('div');
    card.className = 'table-qr-card';
    card.id = 'card-' + t;
    card.innerHTML = `
      <div class="card-top">
        <div class="table-label">Table</div>
        <div class="table-num">${t}</div>
      </div>
      <div class="qr-wrap" id="qr-${t}"></div>
      <div class="card-bottom">
        <button class="card-btn btn-print" onclick="printSingle(${t})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
        <button class="card-btn btn-open" onclick="window.open('${url}','_blank')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Test
        </button>
      </div>
    `;
    grid.appendChild(card);

    // Generate QR code
    new QRCode(document.getElementById('qr-' + t), {
      text: url,
      width: 160,
      height: 160,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }
}

/* ── Print a single QR card ── */
function printSingle(tableNum) {
  const url = currentBaseUrl + '?table=' + tableNum;
  const qrEl = document.getElementById('qr-' + tableNum);
  const img = qrEl.querySelector('img') || qrEl.querySelector('canvas');
  const qrSrc = img ? (img.tagName === 'CANVAS' ? img.toDataURL() : img.src) : '';

  const sheet = document.getElementById('print-sheet');
  sheet.innerHTML = `
    <div class="print-cell" style="grid-column:1/-1; max-width:280px; margin:0 auto;">
      <div class="print-cell-brand">EMERALD</div>
      <div class="print-cell-table">Scan to Order</div>
      <div class="print-cell-num">Table ${tableNum}</div>
      <div class="print-cell-qr"><img src="${qrSrc}" width="200" height="200" style="display:block;margin:0 auto;"></div>
      <div class="print-cell-url">${url}</div>
    </div>
  `;
  window.print();
}

/* ── Print ALL QRs (3-up layout) ── */
function printAll() {
  if (!currentBaseUrl) { alert('Generate QR codes first.'); return; }

  const sheet = document.getElementById('print-sheet');
  let cells = '';

  for (let t = 1; t <= TOTAL_TABLES; t++) {
    const url = currentBaseUrl + '?table=' + t;
    const qrEl = document.getElementById('qr-' + t);
    const img = qrEl ? (qrEl.querySelector('img') || qrEl.querySelector('canvas')) : null;
    const qrSrc = img ? (img.tagName === 'CANVAS' ? img.toDataURL() : img.src) : '';

    cells += `
      <div class="print-cell">
        <div class="print-cell-brand">EMERALD</div>
        <div class="print-cell-table">Scan to Order</div>
        <div class="print-cell-num">Table ${t}</div>
        <div class="print-cell-qr"><img src="${qrSrc}" width="160" height="160" style="display:block;margin:0 auto;"></div>
        <div class="print-cell-url">${url}</div>
      </div>
    `;
  }
  sheet.innerHTML = cells;
  window.print();
}
</script>
</body>
</html>
